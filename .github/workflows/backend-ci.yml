name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint-and-test:
    name: Lint, type-check, security scan, test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff — lint
        run: ruff check app/ tests/

      - name: Ruff — format check
        run: ruff format --check app/ tests/

      - name: Mypy — type check
        run: mypy app/

      - name: Bandit — security scan
        run: bandit -r app/ -c pyproject.toml

      - name: Pytest
        env:
          # Supply dummy values so settings validation passes without real secrets
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || 'placeholder-key' }}
          NYT_API_KEY: ${{ secrets.NYT_API_KEY || '' }}
          GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY || '' }}
          ALLOWED_ORIGINS: "http://localhost:3000"
        run: pytest -v
