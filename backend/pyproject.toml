[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "S", "UP", "B", "A", "C4", "T20"]
ignore = ["S101"]  # allow assert in tests

[tool.ruff.lint.per-file-ignores]
# Long LLM prompt strings are intentionally not wrapped
"app/agents/book_agent.py" = ["E501"]
"app/api/routes/book_detail.py" = ["E501"]

[tool.mypy]
python_version = "3.13"
strict = false
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]

[tool.bandit]
exclude_dirs = ["tests", ".venv"]
