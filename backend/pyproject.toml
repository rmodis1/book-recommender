[tool.ruff]
target-version = "py313"
line-length = 100
select = ["E", "F", "I", "N", "S", "UP", "B", "A", "C4", "T20"]
ignore = ["S101"]  # allow assert in tests

[tool.mypy]
python_version = "3.13"
strict = false
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]

[tool.bandit]
exclude_dirs = ["tests", ".venv"]
